<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitoramento ESP32</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 30px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 900px; margin: 0 auto; }
        h2 { color: #2c3e50; border-bottom: 2px solid #007BFF; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; }
        th { background-color: #007BFF; color: white; font-weight: 600; text-transform: uppercase; font-size: 14px; }
        tr { border-bottom: 1px solid #eeeeee; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        tr:hover { background-color: #f1f3f5; transition: 0.2s; }
        .status-erro { color: #dc3545; font-weight: bold; text-align: center; padding: 20px; }
        .status-vazio { color: #6c757d; text-align: center; padding: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>📊 Monitoramento em Tempo Real </h2>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Temperatura</th>
                    <th>Umidade</th>
                    <th>Data / Hora</th>
                </tr>
            </thead>
            <tbody id="tabela-dados">
                <tr>
                    <td colspan="4" style="text-align:center;">Aguardando primeira leitura do ESP32...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        async function buscarDadosDoBanco() {
            try {
                // Busca os dados da rota do seu server.js
                const resposta = await fetch('/api/dados');
                
                if (!resposta.ok) {
                    throw new Error(`Erro no servidor (Status ${resposta.status})`);
                }

                const dados = await resposta.json();
                const corpoTabela = document.getElementById('tabela-dados');
                
                // Limpa o estado anterior da tabela
                corpoTabela.innerHTML = '';

                // Se a tabela do banco estiver vazia
                if (!dados || dados.length === 0) {
                    corpoTabela.innerHTML = `<tr><td colspan="4" class="status-vazio">Nenhum dado registrado no SQLite ainda. Envie dados pelo ESP32!</td></tr>`;
                    return;
                }

                // Preenche as linhas da tabela
                dados.forEach(item => {
                    const linha = document.createElement('tr');
                    
                    // Trata a data para o padrão brasileiro (DD/MM/AAAA HH:MM:SS)
                    let dataFormatada = '---';
                    if (item.datahora) {
                        // Substitui o espaço do SQLite por 'T' para o JavaScript entender como ISO caso necessário
                        const dataTratada = item.datahora.includes(' ') ? item.datahora.replace(' ', 'T') : item.datahora;
                        const dataObjeto = new Date(dataTratada);
                        if (!isNaN(dataObjeto)) {
                            dataFormatada = dataObjeto.toLocaleString('pt-BR');
                        } else {
                            dataFormatada = item.datahora; // Fallback se já vier formatado do servidor
                        }
                    }

                    // Garante que se o dado vier nulo/indefinido ele mostre '---'
                    const temp = item.temperatura !== undefined && item.temperatura !== null ? `${item.temperatura}°C` : '---';
                    const umid = item.umidade !== undefined && item.umidade !== null ? `${item.umidade}%` : '---';
                    const id = item.id ?? '---';

                    linha.innerHTML = `
                        <td><strong>${id}</strong></td>
                        <td>${temp}</td>
                        <td>${umid}</td>
                        <td>${dataFormatada}</td>
                    `;
                    corpoTabela.appendChild(linha);
                });

            } catch (erro) {
                console.error('Erro ao renderizar tabela:', erro);
                document.getElementById('tabela-dados').innerHTML = 
                    `<tr><td colspan="4" class="status-erro">❌ Falha ao conectar: ${erro.message}</td></tr>`;
            }
        }

        // Executa assim que a página abre
        window.onload = buscarDadosDoBanco;

        // Atualiza a tabela a cada 3 segundos automaticamente para ficar bem dinâmico
        setInterval(buscarDadosDoBanco, 10000);
    </script>
    
    <style>
         body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            padding: 20px;
            margin: 0;
        }
        h1 {
            text-align: center;
        }
        /* Container Flexbox para alinhar lado a lado */
        .dashboard {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: flex-start;
            gap: 30px; /* Espaço entre o gráfico e a tabela */
            flex-wrap: wrap; /* Quebra linha em telas pequenas/celular */
            margin-top: 20px;
        }
        .bloco {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        /* Estilização da Tabela */
        table {
            border-collapse: collapse;
            width: 350px;
            font-size: 14px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: center;
        }
        th {
            background-color: #007bff;
            color: white;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        .btn-container {
            text-align: center;
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
<body>

    <div class="container">
        <h1>Dados de Temperatura e Umidade</h1>
        <!-- A imagem consome diretamente o endpoint do Node.js -->
        <img id="grafico" src="/grafico.png" alt="Gráfico de Telemetria do ESP32">
      <br>
        <button onclick="atualizarGrafico()">Atualizar Gráfico</button>
    </div>

    <script>
        function atualizarGrafico() {
            const img = document.getElementById('grafico');
            // Adiciona um timestamp (Date.now) na URL para burlar o cache do navegador e forçar o reload
            img.src = '/grafico.png?t=' + Date.now();
        }

        // Opcional: Atualiza o gráfico sozinho a cada 5 segundos
        setInterval(atualizarGrafico, 5000);
    </script>
    <br>
    <br>
<!-- Botão de Logout para adicionar no seu index.html -->
<button id="logoutBtn" style="padding: 8px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer;">Sair do Sistema</button>

<script>
    document.getElementById('logoutBtn').addEventListener('click', async () => {
        const response = await fetch('/api/logout', { method: 'POST' });
        if (response.ok) {
            window.location.href = '/login';
        }
    });
</script>
<br>
<br>
<!-- Botão de Acesso às Configurações -->
<button onclick="window.location.href='/configuracoes'" style="padding: 10px 15px; background-color: #6c757d; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; font-weight: bold;">
    ⚙️ Configurações de Acesso
</button>

</body>
</html>
